<!-- @dsCard group="Colors" viewport="700x200" name="Aluminium Scale" subtitle="Brushed-metal greys for product & material renders" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:var(--bg); font-family:var(--font-text); padding:30px 40px; min-height:100vh; display:flex; align-items:center; }
  .grid{ display:grid; grid-template-columns:repeat(8,1fr); gap:12px; width:100%; }
  .sw{ display:flex; flex-direction:column; gap:8px; }
  .chip{ height:84px; border-radius:var(--radius-sm); border:1px solid var(--hairline); }
  .n{ font-size:9.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-1); font-weight:600; }
  .h{ font-size:9.5px; letter-spacing:0.04em; color:var(--ink-3); }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#ECEDEC"></div><div class="n">Metal&nbsp;50</div><div class="h">#ECEDEC</div></div>
    <div class="sw"><div class="chip" style="background:#DFE1E1"></div><div class="n">Metal&nbsp;100</div><div class="h">#DFE1E1</div></div>
    <div class="sw"><div class="chip" style="background:#C8CBCC"></div><div class="n">Metal&nbsp;200</div><div class="h">#C8CBCC</div></div>
    <div class="sw"><div class="chip" style="background:#ABAFB1"></div><div class="n">Metal&nbsp;300</div><div class="h">#ABAFB1</div></div>
    <div class="sw"><div class="chip" style="background:#8C9093"></div><div class="n">Metal&nbsp;400</div><div class="h">#8C9093</div></div>
    <div class="sw"><div class="chip" style="background:#6C7073"></div><div class="n">Metal&nbsp;500</div><div class="h">#6C7073</div></div>
    <div class="sw"><div class="chip" style="background:#4E5255"></div><div class="n">Metal&nbsp;600</div><div class="h">#4E5255</div></div>
    <div class="sw"><div class="chip" style="background:#161512"></div><div class="n">Cap&nbsp;Black</div><div class="h">#161512</div></div>
  </div>
</body>
</html>
