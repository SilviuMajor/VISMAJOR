<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:var(--bg); color:var(--ink-0); font-family:var(--font-text); padding:32px 44px; min-height:100vh; display:flex; align-items:center; }
  .row{ display:grid; grid-template-columns:repeat(3,1fr); gap:22px; width:100%; }
  .mat{ display:flex; flex-direction:column; gap:10px; }
  .swatch{ height:120px; border-radius:var(--radius-sm); border:1px solid var(--hairline); }
  .alu{ background:
      linear-gradient(90deg,#d8d5cc 0%,#f3f1ea 16%,#ffffff 44%,#ffffff 56%,#eeebe4 82%,#d4d1c8 100%); }
  .paper{ background:#fff; box-shadow:inset 0 0 0 1px var(--hairline); }
  .black{ background:linear-gradient(160deg,#2a2926,#161512 60%,#0d0c0a); }
  .n{ font-size:11px; letter-spacing:var(--track-caps); text-transform:uppercase; font-weight:600; }
  .d{ font-size:10px; letter-spacing:0.08em; color:var(--ink-2); }
</style>
</head>
<body>
  <div class="row">
    <div class="mat"><div class="swatch alu"></div><div class="n">Matte White</div><div class="d">Tube body · tin · ink-printed</div></div>
    <div class="mat"><div class="swatch paper"></div><div class="n">Label Stock</div><div class="d">Matte white · ink print · hairline edge</div></div>
    <div class="mat"><div class="swatch black"></div><div class="n">Matte Black</div><div class="d">Flip-cap · screw lid · soft sheen</div></div>
  </div>
</body>
</html>
