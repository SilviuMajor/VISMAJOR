<!-- @dsCard group="Brand" viewport="700x380" name="Product · Balm Tin" subtitle="8g matte-white screw tin" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:var(--bg); font-family:var(--font-text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:30px; }
  .scene{ position:relative; display:flex; flex-direction:column; align-items:center; }
  .tin{ width:248px; position:relative; z-index:2; }
  /* knurled lid */
  .lid{ width:248px; height:50px; border-radius:10px 10px 4px 4px; position:relative;
    background:linear-gradient(90deg,#d6d3ca,#f2f0e9 16%,#ffffff 46%,#ffffff 54%,#ece9e2 82%,#d2cfc6);
    box-shadow:inset 0 3px 4px rgba(255,255,255,0.6), inset 0 -4px 6px rgba(0,0,0,0.12); }
  /* body */
  .body{ width:236px; height:188px; margin:-3px auto 0; border-radius:0 0 8px 8px; position:relative; overflow:hidden;
    background:linear-gradient(90deg,#d8d5cc,#f3f1ea 16%,#ffffff 44%,#ffffff 56%,#eeebe4 82%,#d4d1c8);
    box-shadow:0 30px 40px -26px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(20,19,15,0.06); }
  .body::before{ content:""; position:absolute; left:0; right:0; top:0; height:30px; background:linear-gradient(180deg, rgba(255,255,255,0.5), transparent); }
  /* white label */
  .label{ position:absolute; left:30px; right:30px; top:30px; bottom:26px; background:#fff; border-radius:3px;
    box-shadow:0 6px 14px -8px rgba(0,0,0,0.25); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px; padding:14px; text-align:center; }
  .label .wm{ font-family:var(--font-display); font-weight:600; letter-spacing:0.05em; font-size:22px; color:var(--ink-0); white-space:nowrap; line-height:1; }
  .label .desc{ font-family:var(--font-display); font-weight:500; letter-spacing:0.2em; text-transform:uppercase; font-size:12px; color:var(--ink-0); }
  .label .sub{ font-weight:400; letter-spacing:0.18em; text-transform:uppercase; font-size:9px; color:var(--ink-1); }
  .label .oz{ font-weight:500; letter-spacing:0.1em; text-transform:uppercase; font-size:9px; color:var(--ink-0); margin-top:4px; }
  .ground{ width:270px; height:24px; margin-top:8px; border-radius:50%; background:radial-gradient(50% 50%, rgba(20,19,15,0.42), transparent 72%); filter:blur(6px); }
</style>
</head>
<body>
  <div class="scene">
    <div class="tin">
      <div class="lid"></div>
      <div class="body">
        <div class="label">
          <div class="wm">GY-NO!</div>
          <div class="desc">Nipple Balm</div>
          <div class="sub">Soothe + Protect</div>
          <div class="oz">8g &#8494; 0.28 oz</div>
        </div>
      </div>
    </div>
    <div class="ground"></div>
  </div>
</body>
</html>
