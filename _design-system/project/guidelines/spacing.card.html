<!-- @dsCard group="Spacing" viewport="700x260" name="Spacing, Radii & Frame" subtitle="4px scale · tight radii · the keyline frame" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:var(--bg); color:var(--ink-0); font-family:var(--font-text); padding:32px 44px; min-height:100vh; display:flex; flex-direction:column; justify-content:center; gap:26px; }
  .sect{ font-size:10px; letter-spacing:var(--track-caps); text-transform:uppercase; color:var(--ink-3); margin-bottom:14px; }
  .scale{ display:flex; align-items:flex-end; gap:12px; }
  .bar{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar .b{ width:18px; background:var(--ink-0); border-radius:var(--radius-xs); }
  .bar .t{ font-size:9px; color:var(--ink-2); letter-spacing:0.05em; }
  .radii{ display:flex; gap:20px; align-items:center; }
  .rad{ display:flex; flex-direction:column; align-items:center; gap:7px; }
  .rad .r{ width:54px; height:40px; background:var(--metal-200); border:1px solid var(--hairline-strong); }
  .rad .t{ font-size:9px; color:var(--ink-2); letter-spacing:0.06em; text-transform:uppercase; }
  .cols{ display:grid; grid-template-columns:1.6fr 1fr; gap:40px; align-items:center; }
  .frame{ height:96px; border:1px solid var(--ink-0); position:relative; display:flex; align-items:center; justify-content:center; }
  .frame .in{ position:absolute; inset:8px; border:1px solid var(--hairline-strong); }
  .frame span{ font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--ink-2); z-index:1; }
</style>
</head>
<body>
  <div class="cols">
    <div>
      <div class="sect">Spacing · 4px base</div>
      <div class="scale">
        <div class="bar"><div class="b" style="height:8px"></div><div class="t">2</div></div>
        <div class="bar"><div class="b" style="height:12px"></div><div class="t">3</div></div>
        <div class="bar"><div class="b" style="height:16px"></div><div class="t">4</div></div>
        <div class="bar"><div class="b" style="height:24px"></div><div class="t">5</div></div>
        <div class="bar"><div class="b" style="height:32px"></div><div class="t">6</div></div>
        <div class="bar"><div class="b" style="height:48px"></div><div class="t">7</div></div>
        <div class="bar"><div class="b" style="height:64px"></div><div class="t">8</div></div>
      </div>
    </div>
    <div>
      <div class="sect">Radii</div>
      <div class="radii">
        <div class="rad"><div class="r" style="border-radius:0"></div><div class="t">None</div></div>
        <div class="rad"><div class="r" style="border-radius:2px"></div><div class="t">XS&nbsp;2</div></div>
        <div class="rad"><div class="r" style="border-radius:4px"></div><div class="t">SM&nbsp;4</div></div>
      </div>
    </div>
  </div>
  <div>
    <div class="sect">Keyline frame · inset 16</div>
    <div class="frame"><div class="in"></div><span>Full compositions sit inside a thin double keyline</span></div>
  </div>
</body>
</html>
