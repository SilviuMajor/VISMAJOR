<!-- @dsCard group="Type" viewport="700x300" name="Display · Wordmark" subtitle="Jost geometric — the GY-NO! lockup & display headlines" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:var(--bg); color:var(--ink-0); font-family:var(--font-text); padding:40px 48px; min-height:100vh; display:flex; flex-direction:column; justify-content:center; gap:26px; }
  .wm{ font-family:var(--font-display); font-weight:600; letter-spacing:var(--track-wordmark); font-size:84px; line-height:0.9; }
  .hl{ font-family:var(--font-display); font-weight:700; letter-spacing:var(--track-tight); text-transform:uppercase; font-size:40px; line-height:0.95; }
  .meta{ display:flex; gap:40px; border-top:1px solid var(--hairline); padding-top:14px; }
  .meta div{ font-size:11px; letter-spacing:var(--track-caps); text-transform:uppercase; color:var(--ink-2); }
  .meta b{ display:block; color:var(--ink-0); font-weight:600; margin-bottom:3px; }
</style>
</head>
<body>
  <div class="wm">GY-NO!</div>
  <div class="hl">Maximum Stiffness.</div>
  <div class="meta">
    <div><b>Family</b>Jost</div>
    <div><b>Wordmark</b>600 · +0.04em</div>
    <div><b>Display</b>700 · −0.01em</div>
    <div><b>Case</b>Caps</div>
  </div>
</body>
</html>
